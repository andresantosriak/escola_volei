<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--gray-0);padding:24px 26px;color:var(--fg-1)}
  .meta{color:var(--fg-3);font-size:11px;font-weight:600}
  .blk{padding:10px 0;border-bottom:1px solid var(--border-1)}
  .blk:last-child{border-bottom:0}
  .tag{color:var(--fg-3);font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;display:block;margin-bottom:5px}
</style></head>
<body>
  <div class="blk">
    <span class="tag">Body · Barlow 16 / 400</span>
    <p class="q-body" style="margin:0;max-width:560px">Faça a chamada, avalie rápido, monte dois times justos e registre o resultado — em poucos toques.</p>
  </div>
  <div class="blk">
    <span class="tag">Small · Barlow 14 / 500</span>
    <p class="q-sm" style="margin:0">Amostra insuficiente — jogue mais treinos para liberar as notas.</p>
  </div>
  <div class="blk">
    <span class="tag">Label / overline · Barlow 11 / 700 · uppercase</span>
    <div style="display:flex;gap:18px;margin-top:2px">
      <span class="q-label">Presença</span><span class="q-label">Geral</span><span class="q-label">V / D</span><span class="q-label">Aproveitamento</span>
    </div>
  </div>
</body></html>
