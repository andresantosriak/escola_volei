<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--gray-50);padding:26px 28px;color:var(--fg-1)}
  .cap{font-family:var(--font-display);font-weight:800;font-size:14px;margin:0 0 4px}
  .sub{color:var(--fg-3);font-size:11.5px;margin:0 0 18px}
  .row{display:flex;align-items:flex-end;gap:26px}
  .item{display:flex;flex-direction:column;align-items:center;gap:9px}
  .item img{box-shadow:var(--shadow-md)}
  .sz{font-size:10.5px;color:var(--fg-3);font-weight:600}
</style></head>
<body>
  <p class="cap">App icon</p>
  <p class="sub">Bandeira-green gradient tile · white seams · yellow "ace" center.</p>
  <div class="row">
    <div class="item"><img src="../assets/app-icon.svg" style="width:96px;height:96px;border-radius:22px"><span class="sz">96 px</span></div>
    <div class="item"><img src="../assets/app-icon.svg" style="width:64px;height:64px;border-radius:15px"><span class="sz">64 px</span></div>
    <div class="item"><img src="../assets/app-icon.svg" style="width:44px;height:44px;border-radius:10px"><span class="sz">44 px</span></div>
    <div class="item"><img src="../assets/app-icon.svg" style="width:28px;height:28px;border-radius:7px"><span class="sz">28 px</span></div>
  </div>
</body></html>
