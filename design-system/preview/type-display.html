<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--gray-0);padding:24px 26px;color:var(--fg-1)}
  .meta{color:var(--fg-3);font-size:11px;font-weight:600;letter-spacing:.04em}
  .line{display:flex;align-items:baseline;gap:14px;padding:9px 0;border-bottom:1px solid var(--border-1)}
  .line:last-child{border-bottom:0}
  .tag{flex:0 0 116px;color:var(--fg-3);font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
</style></head>
<body>
  <div class="line"><span class="tag">Display · 900</span><span class="q-display">87</span><span class="meta">Archivo 44px · jersey numbers</span></div>
  <div class="line"><span class="tag">H1 · 800</span><span class="q-h1">Iniciar treino</span><span class="meta">Archivo 28px</span></div>
  <div class="line"><span class="tag">H2 · 700</span><span class="q-h2">Montar times</span><span class="meta">Archivo 22px</span></div>
  <div class="line"><span class="tag">H3 · 700</span><span class="q-h3">Chamada do dia</span><span class="meta">Archivo 18px</span></div>
</body></html>
