<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--gray-50);padding:22px 24px;color:var(--fg-1)}
  .cap{font-family:var(--font-display);font-weight:800;font-size:14px;margin:0 0 14px;color:var(--fg-2)}
  .row{display:flex;gap:14px;align-items:stretch}
  .stat{background:var(--gray-0);border-radius:14px;box-shadow:var(--shadow-sm);padding:14px 18px;display:flex;flex-direction:column;align-items:center;flex:1}
  .n{font-family:var(--font-num);font-weight:900;font-size:42px;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .l{font-family:var(--font-body);font-weight:700;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);margin-top:7px}
</style></head>
<body>
  <p class="cap">Stats are protagonists — big number, tiny label</p>
  <div class="row">
    <div class="stat"><span class="n" style="color:var(--green-500)">87</span><span class="l">Geral</span></div>
    <div class="stat"><span class="n" style="color:var(--win-500)">12<span style="font-size:24px;color:var(--fg-3)">V</span></span><span class="l">Vitórias</span></div>
    <div class="stat"><span class="n" style="color:var(--loss-500)">4<span style="font-size:24px;color:var(--fg-3)">D</span></span><span class="l">Derrotas</span></div>
    <div class="stat"><span class="n">85<span style="font-size:24px;color:var(--fg-3)">%</span></span><span class="l">Presença</span></div>
    <div class="stat"><span class="n">11<span style="font-size:24px;color:var(--fg-3)">/14</span></span><span class="l">Presentes</span></div>
  </div>
</body></html>
