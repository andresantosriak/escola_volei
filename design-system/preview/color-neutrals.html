<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--gray-0);padding:22px 24px;color:var(--fg-1)}
  .row{display:flex;border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border-1)}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 8px}
  .sw b{font-size:11px;font-weight:700}
  .sw span{font-size:9.5px;opacity:.85;font-variant-numeric:tabular-nums}
  .cap{font-family:var(--font-display);font-weight:800;font-size:15px;margin:0 0 12px}
  .cap em{font-style:normal;color:var(--fg-3);font-weight:600;font-size:12px;margin-left:6px}
</style></head>
<body>
  <p class="cap">Neutrals <em>— cool gray ramp · chrome, text, surfaces</em></p>
  <div class="row">
    <div class="sw" style="background:var(--gray-0);color:#141821"><b>0</b><span>#FFFFFF</span></div>
    <div class="sw" style="background:var(--gray-50);color:#141821"><b>50</b><span>#F4F6FB</span></div>
    <div class="sw" style="background:var(--gray-100);color:#141821"><b>100</b><span>#EAEEF5</span></div>
    <div class="sw" style="background:var(--gray-200);color:#141821"><b>200</b><span>#DCE2EC</span></div>
    <div class="sw" style="background:var(--gray-300);color:#141821"><b>300</b><span>#C2CAD8</span></div>
    <div class="sw" style="background:var(--gray-400);color:#fff"><b>400</b><span>#97A1B4</span></div>
    <div class="sw" style="background:var(--gray-500);color:#fff"><b>500</b><span>#6B7488</span></div>
    <div class="sw" style="background:var(--gray-600);color:#fff"><b>600</b><span>#4C5466</span></div>
    <div class="sw" style="background:var(--gray-700);color:#fff"><b>700</b><span>#353C4D</span></div>
    <div class="sw" style="background:var(--gray-900);color:#fff"><b>900</b><span>#141821</span></div>
  </div>
</body></html>
