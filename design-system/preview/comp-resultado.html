<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body{margin:0;font-family:var(--font-body);background:var(--gray-50);padding:22px 24px;color:var(--fg-1)}
  .cap{font-family:var(--font-display);font-weight:800;font-size:14px;margin:0 0 14px}
  .card{background:var(--gray-0);border-radius:16px;box-shadow:var(--shadow-md);padding:16px 18px}
  .date{font-size:11px;color:var(--fg-3);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
  .date svg{width:14px;height:14px}
  .match{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .team{flex:1;display:flex;flex-direction:column;gap:4px}
  .team.b{align-items:flex-end;text-align:right}
  .tn{font-family:var(--font-display);font-weight:800;font-size:18px;display:flex;align-items:center;gap:7px}
  .win{color:var(--win-700)}
  .roster{font-size:11px;color:var(--fg-3)}
  .score{font-family:var(--font-num);font-weight:900;font-size:34px;letter-spacing:-.02em;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:10px}
  .x{font-family:var(--font-body);font-weight:600;color:var(--fg-4);font-size:18px}
  .tr{width:18px;height:18px;color:var(--yellow-500)}
  .sets{font-size:11px;color:var(--fg-3);text-align:center;margin-top:10px}
</style></head>
<body>
  <p class="cap">Card de resultado de partida</p>
  <div class="card">
    <div class="date"><i data-lucide="calendar"></i>Ter · 27 mai</div>
    <div class="match">
      <div class="team"><span class="tn win"><i data-lucide="trophy" class="tr"></i>Furacão</span><span class="roster">Bruno, Lucas, Marina +4</span></div>
      <div class="score"><span class="win">2</span><span class="x">×</span><span>1</span></div>
      <div class="team b"><span class="tn">Tubarões</span><span class="roster">Pedro, Joana, Rafa +4</span></div>
    </div>
    <p class="sets">25–22 · 23–25 · 15–11</p>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
