<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--gray-0);padding:22px 24px;color:var(--fg-1)}
  .row{display:flex;gap:0;border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 9px}
  .sw b{font-size:12px;font-weight:700}
  .sw span{font-size:10px;opacity:.8;font-variant-numeric:tabular-nums}
  .cap{font-family:var(--font-display);font-weight:800;font-size:15px;margin:0 0 12px}
  .cap em{font-style:normal;color:var(--fg-3);font-weight:600;font-size:12px;margin-left:6px}
</style></head>
<body>
  <p class="cap">Verde Canarinho <em>— primary · buttons, links, active states</em></p>
  <div class="row">
    <div class="sw" style="background:var(--green-50);color:#006B29"><b>50</b><span>#E7F7EE</span></div>
    <div class="sw" style="background:var(--green-100);color:#006B29"><b>100</b><span>#C4EBD3</span></div>
    <div class="sw" style="background:var(--green-200);color:#006B29"><b>200</b><span>#8FD9AB</span></div>
    <div class="sw" style="background:var(--green-300);color:#06331A"><b>300</b><span>#54C57F</span></div>
    <div class="sw" style="background:var(--green-400);color:#fff"><b>400</b><span>#1BAE57</span></div>
    <div class="sw" style="background:var(--green-500);color:#fff"><b>500 ·</b><span>#009C3B</span></div>
    <div class="sw" style="background:var(--green-600);color:#fff"><b>600</b><span>#008733</span></div>
    <div class="sw" style="background:var(--green-700);color:#fff"><b>700</b><span>#006B29</span></div>
    <div class="sw" style="background:var(--green-900);color:#fff"><b>900</b><span>#06331A</span></div>
  </div>
</body></html>
