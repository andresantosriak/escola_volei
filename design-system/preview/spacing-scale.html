<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--gray-0);padding:22px 24px;color:var(--fg-1)}
  .cap{font-family:var(--font-display);font-weight:800;font-size:14px;margin:0 0 14px}
  .cap em{font-style:normal;color:var(--fg-3);font-weight:600;font-size:12px;margin-left:6px}
  .r{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .t{flex:0 0 92px;font-size:11.5px;color:var(--fg-2);font-weight:600}
  .t b{color:var(--fg-1)}
  .bar{height:16px;background:var(--green-500);border-radius:4px}
</style></head>
<body>
  <p class="cap">Spacing <em>— 4pt base</em></p>
  <div class="r"><span class="t"><b>sp-1</b> · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="r"><span class="t"><b>sp-2</b> · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="t"><b>sp-3</b> · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="r"><span class="t"><b>sp-4</b> · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="t"><b>sp-5</b> · 20</span><div class="bar" style="width:20px"></div></div>
  <div class="r"><span class="t"><b>sp-6</b> · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="t"><b>sp-7</b> · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="t"><b>sp-8</b> · 40</span><div class="bar" style="width:40px"></div></div>
  <div class="r"><span class="t"><b>sp-9</b> · 56</span><div class="bar" style="width:56px"></div></div>
</body></html>
