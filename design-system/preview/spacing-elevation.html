<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--gray-50);padding:26px 24px 30px;color:var(--fg-1)}
  .cap{font-family:var(--font-display);font-weight:800;font-size:14px;margin:0 0 20px}
  .row{display:flex;gap:20px}
  .item{flex:1;display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:100%;height:64px;background:var(--gray-0);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--fg-2)}
  .nm{font-size:11px;font-weight:700}
  .vl{font-size:10px;color:var(--fg-3);text-align:center}
</style></head>
<body>
  <p class="cap">Elevation</p>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)">sm</div><span class="vl">hairline lift</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)">md</div><span class="vl">cards</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)">lg</div><span class="vl">sheets, popovers</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-cta);background:var(--green-500);color:#fff">cta</div><span class="vl">primary CTA glow</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-card);background:var(--ink-800);color:#fff">card</div><span class="vl">player card</span></div>
  </div>
</body></html>
