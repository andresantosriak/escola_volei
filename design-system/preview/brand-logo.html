<!-- @dsCard group="Brand" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--gray-0);padding:0;color:var(--fg-1)}
  .wrap{display:grid;grid-template-columns:1fr 1fr}
  .panel{padding:28px;display:flex;flex-direction:column;gap:14px;justify-content:center}
  .dark{background:var(--ink-800)}
  .lock{display:flex;align-items:center;gap:13px}
  .lock img{width:50px;height:50px}
  .wm{font-family:var(--font-display);font-weight:900;font-size:21px;line-height:.98;letter-spacing:.005em;text-transform:uppercase}
  .wm small{display:block;font-weight:700;font-size:11px;letter-spacing:.18em;color:var(--green-600)}
  .wm.lt{color:#fff}
  .wm.lt small{color:var(--yellow-400)}
  .tag{font-size:11px;font-weight:600;letter-spacing:.02em;color:var(--fg-3)}
  .tag.lt{color:rgba(255,255,255,.6)}
</style></head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="lock"><img src="../assets/logo-mark.svg" alt=""><span class="wm"><small>Esporte</small>Recreação</span></div>
      <span class="tag">Primary lockup · on light</span>
    </div>
    <div class="panel dark">
      <div class="lock"><img src="../assets/logo-mark.svg" alt=""><span class="wm lt"><small>Esporte</small>Recreação</span></div>
      <span class="tag lt">On azul bandeira · ace dot stays amarelo</span>
    </div>
  </div>
</body></html>
