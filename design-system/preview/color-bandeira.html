<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--gray-0);padding:22px 24px;color:var(--fg-1)}
  .cap{font-family:var(--font-display);font-weight:800;font-size:15px;margin:0 0 4px}
  .sub{color:var(--fg-3);font-size:11.5px;margin:0 0 16px}
  .row{display:flex;gap:12px}
  .col{flex:1;border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border-1)}
  .big{height:78px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px 11px}
  .big b{font-size:13px;font-weight:800}
  .big span{font-size:10px;opacity:.85;font-variant-numeric:tabular-nums}
  .role{padding:8px 11px;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-3);background:var(--gray-0)}
</style></head>
<body>
  <p class="cap">Cores da bandeira</p>
  <p class="sub">Verde + amarelo são as cores preferenciais; azul para superfícies premium; branco para o app.</p>
  <div class="row">
    <div class="col"><div class="big" style="background:var(--green-500);color:#fff"><b>Verde</b><span>#009C3B</span></div><div class="role">Primário</div></div>
    <div class="col"><div class="big" style="background:var(--yellow-400);color:#2A1E00"><b>Amarelo</b><span>#FFCB00</span></div><div class="role">Acento · notas</div></div>
    <div class="col"><div class="big" style="background:var(--ink-700);color:#fff"><b>Azul</b><span>#002776</span></div><div class="role">Premium · dark</div></div>
    <div class="col"><div class="big" style="background:var(--gray-0);color:#10131C;border-bottom:1px solid var(--border-2)"><b>Branco</b><span>#FFFFFF</span></div><div class="role">Superfície</div></div>
  </div>
</body></html>
